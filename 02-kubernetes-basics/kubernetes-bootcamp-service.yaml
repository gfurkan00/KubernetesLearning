apiVersion: v1
kind: Service
metadata:
  name: kubernetes-bootcamp
  labels:
    app: kubernetes-bootcamp
spec:
  type: NodePort
  selector:
    app: kubernetes-bootcamp
  ports:
  - port: 8080
    targetPort: 8080
    # nodePort: 30080    # opzionale: se omesso, k8s assegna automaticamente in 30000-32767
