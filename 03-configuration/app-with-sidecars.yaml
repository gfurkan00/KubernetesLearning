apiVersion: v1
kind: Pod
metadata:
  name: app-with-sidecars
spec:
  containers:
  - name: web-app
    image: nginx:1.27
    ports:
    - containerPort: 80

  initContainers:
  # 1. Init container REGOLARE: parte, fa la sua cosa, termina
  - name: setup
    image: busybox:1.36
    command: ['sh', '-c', 'echo "Setup done"; sleep 2']

  # 2. Sidecar: log aggregator (resta running per tutta la vita del Pod)
  - name: log-aggregator
    image: busybox:1.36
    restartPolicy: Always
    command: ['sh', '-c', 'while true; do echo "[$(date)] log-aggregator running"; sleep 5; done']

  # 3. Sidecar: metrics exporter
  - name: metrics-exporter
    image: busybox:1.36
    restartPolicy: Always
    command: ['sh', '-c', 'while true; do echo "[$(date)] processes=$(ps aux | wc -l)"; sleep 10; done']
